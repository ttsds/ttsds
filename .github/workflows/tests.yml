name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        include:
          - python-version: '3.12'
            is-latest: true
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: latest
          platform: x64

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          # Use uv: its resolver picks wheel-available versions instead of
          # backtracking onto unbuildable sdists (unicodecsv py2 syntax,
          # sentencepiece 0.1.91, ninja 1.9.0 needing skbuild, ...).
          uv pip install --system -e . pytest pytest-cov coverage-badge
          if [ -f requirements-dev.txt ]; then uv pip install --system -r requirements-dev.txt; fi
          
      - name: Generate badges
        if: matrix.is-latest
        run: |
          python scripts/generate_badges.py
          
      - name: Upload coverage reports to Codecov
        if: matrix.is-latest
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }} 